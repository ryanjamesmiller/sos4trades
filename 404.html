<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SOS CTE</title>
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
